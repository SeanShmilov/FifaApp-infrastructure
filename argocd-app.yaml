apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fraudsterslist
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/SeanShmilov/FraudstersList-infrastructure
    targetRevision: main
    path: k8s
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: fraudsterslist
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
