apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraudsterslist-backend-deployment
  namespace: fraudsterslist
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraudsterslist-backend
  template:
    metadata:
      labels:
        app: fraudsterslist-backend
    spec:
      containers:
        - name: fraudsterslist-backend
          image: 765858872029.dkr.ecr.us-east-1.amazonaws.com/fraudsterslist-backend:6fb22c2
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_URI
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
